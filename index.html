<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scientific Calculator</title>
    <style>
        :root {
            --bg: #0e1116;
            --panel: #161b22;
            --panel-2: #0b1f2a;
            --accent: #2dd4bf;
            --accent-2: #f59e0b;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --danger: #ef4444;
            --shadow: rgba(15, 23, 42, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 15%, rgba(45, 212, 191, 0.15), transparent 55%),
                radial-gradient(circle at 80% 0%, rgba(245, 158, 11, 0.15), transparent 45%),
                linear-gradient(160deg, #0a0f16 0%, #0e1116 50%, #050608 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(980px, 100%);
            display: grid;
            gap: 24px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title {
            font-size: clamp(22px, 2.5vw, 32px);
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
        }

        .calculator {
            background: linear-gradient(135deg, rgba(22, 27, 34, 0.98), rgba(9, 32, 44, 0.98));
            border-radius: 24px;
            box-shadow: 0 24px 60px var(--shadow);
            padding: 22px;
            display: grid;
            gap: 18px;
        }

        .display {
            background: rgba(2, 6, 12, 0.9);
            border-radius: 18px;
            padding: 16px;
            display: grid;
            gap: 8px;
        }

        .expression {
            min-height: 32px;
            font-size: 16px;
            color: var(--muted);
            word-wrap: break-word;
        }

        .result {
            min-height: 44px;
            font-size: clamp(28px, 3.5vw, 36px);
            font-weight: 600;
            text-align: right;
            word-wrap: break-word;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 12px 10px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            background: rgba(30, 41, 59, 0.85);
            cursor: pointer;
            transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
        }

        button:hover {
            background: rgba(45, 212, 191, 0.16);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px) scale(0.98);
        }

        .key-operator {
            background: rgba(14, 116, 144, 0.55);
        }

        .key-accent {
            background: rgba(245, 158, 11, 0.3);
        }

        .key-danger {
            background: rgba(239, 68, 68, 0.35);
        }

        .key-wide {
            grid-column: span 2;
        }

        .mode {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--muted);
        }

        .toggle {
            background: rgba(45, 212, 191, 0.2);
            border-radius: 999px;
            padding: 6px 10px;
            font-weight: 600;
            color: var(--text);
        }

        .hint {
            font-size: 13px;
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .keys {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            .key-wide {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div>
                <div class="title">Scientific Calculator</div>
                <div class="subtitle">Trigonometry, logs, powers, and constants with degree/radian support.</div>
            </div>
            <div class="mode">
                <span>Angle Mode</span>
                <button id="angleToggle" class="toggle" type="button">DEG</button>
            </div>
        </header>

        <main class="calculator">
            <section class="display" aria-live="polite">
                <div id="expression" class="expression"></div>
                <div id="result" class="result">0</div>
            </section>

            <section class="keys">
                <button class="key-danger" data-action="clear">AC</button>
                <button class="key-danger" data-action="delete">DEL</button>
                <button class="key-accent" data-action="insert" data-value="(">(</button>
                <button class="key-accent" data-action="insert" data-value=")">)</button>
                <button class="key-operator" data-action="insert" data-value="%">%</button>
                <button class="key-operator" data-action="insert" data-value="/">÷</button>

                <button data-action="func" data-value="sin">sin</button>
                <button data-action="func" data-value="cos">cos</button>
                <button data-action="func" data-value="tan">tan</button>
                <button data-action="func" data-value="asin">sin⁻¹</button>
                <button data-action="func" data-value="acos">cos⁻¹</button>
                <button data-action="func" data-value="atan">tan⁻¹</button>

                <button data-action="func" data-value="log">log</button>
                <button data-action="func" data-value="ln">ln</button>
                <button data-action="func" data-value="sqrt">√</button>
                <button data-action="func" data-value="abs">abs</button>
                <button data-action="func" data-value="exp">exp</button>
                <button class="key-operator" data-action="insert" data-value="^">xʸ</button>

                <button data-action="insert" data-value="7">7</button>
                <button data-action="insert" data-value="8">8</button>
                <button data-action="insert" data-value="9">9</button>
                <button class="key-operator" data-action="insert" data-value="*">×</button>
                <button data-action="const" data-value="pi">π</button>
                <button data-action="const" data-value="e">e</button>

                <button data-action="insert" data-value="4">4</button>
                <button data-action="insert" data-value="5">5</button>
                <button data-action="insert" data-value="6">6</button>
                <button class="key-operator" data-action="insert" data-value="-">−</button>
                <button data-action="func" data-value="pow10">10ˣ</button>
                <button data-action="func" data-value="square">x²</button>

                <button data-action="insert" data-value="1">1</button>
                <button data-action="insert" data-value="2">2</button>
                <button data-action="insert" data-value="3">3</button>
                <button class="key-operator" data-action="insert" data-value="+">+</button>
                <button data-action="func" data-value="reciprocal">1/x</button>
                <button data-action="func" data-value="fact">x!</button>

                <button class="key-wide" data-action="insert" data-value="0">0</button>
                <button data-action="insert" data-value=".">.</button>
                <button class="key-wide key-accent" data-action="equals">=</button>
            </section>

            <div class="hint">Use keyboard input for numbers and operators. Functions auto-wrap the current value if possible.</div>
        </main>
    </div>

    <script>
        const expressionEl = document.getElementById("expression");
        const resultEl = document.getElementById("result");
        const angleToggle = document.getElementById("angleToggle");

        let expression = "";
        let angleMode = "DEG";

        const updateDisplay = (value) => {
            expressionEl.textContent = expression || "";
            resultEl.textContent = value ?? "0";
        };

        const toRadians = (value) => (angleMode === "DEG" ? (value * Math.PI) / 180 : value);
        const fromRadians = (value) => (angleMode === "DEG" ? (value * 180) / Math.PI : value);

        const functions = {
            sin: (x) => Math.sin(toRadians(x)),
            cos: (x) => Math.cos(toRadians(x)),
            tan: (x) => Math.tan(toRadians(x)),
            asin: (x) => fromRadians(Math.asin(x)),
            acos: (x) => fromRadians(Math.acos(x)),
            atan: (x) => fromRadians(Math.atan(x)),
            log: (x) => Math.log10(x),
            ln: (x) => Math.log(x),
            sqrt: (x) => Math.sqrt(x),
            abs: (x) => Math.abs(x),
            exp: (x) => Math.exp(x),
            pow10: (x) => Math.pow(10, x),
            square: (x) => Math.pow(x, 2),
            reciprocal: (x) => 1 / x,
            fact: (x) => {
                if (x < 0 || !Number.isFinite(x)) return NaN;
                const n = Math.round(x);
                if (Math.abs(n - x) > 1e-9) return NaN;
                let total = 1;
                for (let i = 2; i <= n; i += 1) total *= i;
                return total;
            },
        };

        const insert = (value) => {
            expression += value;
            updateDisplay();
        };

        const wrapOrAppendFunction = (name) => {
            if (!expression) {
                expression = `${name}(`;
            } else if (/\)$/.test(expression)) {
                expression = `${name}(${expression})`;
            } else {
                expression += `${name}(`;
            }
            updateDisplay();
        };

        const insertConstant = (name) => {
            expression += name;
            updateDisplay();
        };

        const clearAll = () => {
            expression = "";
            updateDisplay("0");
        };

        const deleteLast = () => {
            expression = expression.slice(0, -1);
            updateDisplay();
        };

        const normalizeExpression = (raw) => {
            let normalized = raw.replace(/\s+/g, "");
            normalized = normalized.replace(/÷/g, "/").replace(/×/g, "*");
            normalized = normalized.replace(/\^/g, "**");
            normalized = normalized.replace(/pi/g, "Math.PI");
            normalized = normalized.replace(/\be\b/g, "Math.E");
            Object.keys(functions).forEach((key) => {
                const matcher = new RegExp(`${key}\\(`, "g");
                normalized = normalized.replace(matcher, `functions.${key}(`);
            });
            return normalized;
        };

        const evaluateExpression = () => {
            if (!expression) return;
            const safePattern = /^[0-9+\-*/().,^a-zA-Z%]*$/;
            if (!safePattern.test(expression)) {
                updateDisplay("Error");
                return;
            }
            const normalized = normalizeExpression(expression);
            try {
                const result = Function("functions", `return (${normalized})`)(functions);
                const formatted = Number.isFinite(result) ? result.toString() : "Error";
                updateDisplay(formatted);
            } catch (error) {
                updateDisplay("Error");
            }
        };

        angleToggle.addEventListener("click", () => {
            angleMode = angleMode === "DEG" ? "RAD" : "DEG";
            angleToggle.textContent = angleMode;
        });

        document.querySelectorAll("button[data-action]").forEach((button) => {
            button.addEventListener("click", () => {
                const action = button.getAttribute("data-action");
                const value = button.getAttribute("data-value");

                if (action === "insert") insert(value);
                if (action === "func") wrapOrAppendFunction(value);
                if (action === "const") insertConstant(value);
                if (action === "clear") clearAll();
                if (action === "delete") deleteLast();
                if (action === "equals") evaluateExpression();
            });
        });

        document.addEventListener("keydown", (event) => {
            const key = event.key;
            if (/^[0-9]$/.test(key)) insert(key);
            if (["+", "-", "*", "/", "%", ".", "(", ")"].includes(key)) insert(key);
            if (key === "Enter") {
                event.preventDefault();
                evaluateExpression();
            }
            if (key === "Backspace") deleteLast();
            if (key === "Escape") clearAll();
        });

        updateDisplay("0");
    </script>
</body>
</html>
